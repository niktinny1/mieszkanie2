<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>Moje Mieszkanie w WebXR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #ECECEC">
      
      <a-assets>
        <a-asset-item id="mieszkanie-obj" src="mieszkanie.obj"></a-asset-item>
        <a-asset-item id="mieszkanie-mtl" src="mieszkanie.mtl"></a-asset-item>
      </a-assets>

      <a-entity obj-model="obj: #mieszkanie-obj; mtl: #mieszkanie-mtl"
                scale="0.01 0.01 0.01"
                position="0 0 0">
      </a-entity>

      <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
      <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
