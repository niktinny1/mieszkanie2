<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>Moje Mieszkanie w WebXR - Sterowanie</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #ECECEC" renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="mieszkanie-obj" src="mieszkanie.obj"></a-asset-item>
        <a-asset-item id="mieszkanie-mtl" src="mieszkanie.mtl"></a-asset-item>
      </a-assets>

      <a-entity obj-model="obj: #mieszkanie-obj; mtl: #mieszkanie-mtl"
                scale="0.01 0.01 0.01"
                position="0 0 0">
      </a-entity>

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" position="-1 2 1" intensity="0.6"></a-light>

      <a-entity id="rig" movement-controls="fly: false; speed: 0.15">
        <a-entity camera 
                  position="0 1.6 0" 
                  look-controls="pointerLockEnabled: true">
        </a-entity>
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
